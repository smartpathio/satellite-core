<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SATELLITE Intelligence Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #f8fafc; 
            color: #334155; 
            font-family: 'Montserrat', sans-serif; 
        }
        .pastel-card { 
            background: white; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        .pastel-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .tag-dpe { background: #e0f2fe; color: #0369a1; }
        .tag-commerce { background: #fef3c7; color: #92400e; }
        .gradient-header { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight italic">SATELLITE <span class="text-indigo-600">CORE</span></h1>
            <div class="flex items-center gap-4 text-xs font-semibold text-slate-500">
                <span id="sync-status" class="flex items-center gap-1">
                    <span class="h-2 w-2 bg-green-500 rounded-full"></span> LIVE SYNC
                </span>
                <span id="last-update" class="hidden md:inline">...</span>
            </div>
        </div>
    </header>

    <nav class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button class="bg-indigo-600 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 whitespace-nowrap">Dashboard</button>
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 whitespace-nowrap">Market Signals</button>
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 whitespace-nowrap">DPE Map</button>
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 whitespace-nowrap">Logistics API</button>
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 whitespace-nowrap">Archives</button>
            <button class="bg-white border border-slate-200 px-6 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 whitespace-nowrap text-indigo-600">+ Add Feed</button>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto px-4 mb-10 grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="pastel-card p-4 rounded-2xl border-b-4 border-indigo-500">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Total Insights</p>
            <p class="text-2xl font-bold text-slate-800" id="stat-total">0</p>
        </div>
        <div class="pastel-card p-4 rounded-2xl border-b-4 border-emerald-500">
            <p class="text-[10px] font-bold text-slate-400 uppercase">High Tension</p>
            <p class="text-2xl font-bold text-slate-800" id="stat-high">0</p>
        </div>
        <div class="pastel-card p-4 rounded-2xl border-b-4 border-amber-500">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Active Scanners</p>
            <p class="text-2xl font-bold text-slate-800">14</p>
        </div>
        <div class="pastel-card p-4 rounded-2xl border-b-4 border-slate-300">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Server Status</p>
            <p class="text-2xl font-bold text-slate-800">Optimal</p>
        </div>
    </section>

    <main id="intelligence-grid" class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
        </main>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                
                document.getElementById('last-update').innerText = `Last update: ${data.last_update}`;
                document.getElementById('stat-total').innerText = data.deep_analysis.length;
                document.getElementById('stat-high').innerText = data.deep_analysis.filter(i => i.decision === 'YES').length;

                const grid = document.getElementById('intelligence-grid');
                grid.innerHTML = '';

                data.deep_analysis.forEach(item => {
                    const tagClass = item.market === 'DPE' ? 'tag-dpe' : 'tag-commerce';
                    const card = document.createElement('div');
                    card.className = "pastel-card p-6 rounded-3xl flex flex-col h-full";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${tagClass}">${item.market}</span>
                            <span class="text-[10px] font-bold ${item.decision === 'YES' ? 'text-emerald-600' : 'text-slate-400'}">● ${item.decision}</span>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mb-2 leading-tight">${item.niche_or_area}</h3>
                        <p class="text-sm text-slate-500 mb-6 flex-grow">${item.reason_short}</p>
                        <div class="mt-auto pt-4 border-t border-slate-100">
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Intuition Engine Signal</p>
                            <p class="text-xs font-medium text-indigo-600 italic">"${item.intuition_signal}"</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Sync Error:", error);
                document.getElementById('intelligence-grid').innerHTML = "<p class='col-span-full text-center py-20 text-slate-400'>Loading signals...</p>";
            }
        }
        loadData();
    </script>
</body>
</html>
