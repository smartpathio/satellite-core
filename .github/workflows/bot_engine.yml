name: Daily Satellite Report

on:
  schedule:
    - cron: '0 7 * * *' # Runs at 08:00 AM Polish time (07:00 UTC)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Execute Master Engine
        run: python app_master_engine.py

      - name: Sync results to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Automated update: $(date)" || echo "No changes detected"
          git push